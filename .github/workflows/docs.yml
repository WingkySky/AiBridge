# AIBridge 文档网站 · 构建并部署到 GitHub Pages
#
# 触发：push 到 main 且 docs/、mkdocs.yml、requirements.txt 或本 workflow 变动时
# 产物：mkdocs material 静态站点 -> GitHub Pages
# URL：https://wingkysky.github.io/AGN-SDK/
#
# 说明：
# - 使用 actions/deploy-pages@v4（官方 Pages 部署 action，需 Pages Source 设为 GitHub Actions）
# - mkdocs build 不加 --strict：现有文档内含指向仓库根 README 的相对链接（docs 目录之外），
#   会产生 warning 但不影响部署；--strict 会把这些 warning 升级为 error 而阻断构建。

name: 文档网站

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只允许一个部署任务运行，排队中的不取消（避免半成品部署）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: 构建 mkdocs 站点
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: 安装 mkdocs 依赖
        run: pip install -r requirements.txt
      - name: 构建站点
        run: mkdocs build --clean
      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5
      - name: 上传站点 artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: 部署到 GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署
        id: deployment
        uses: actions/deploy-pages@v4
